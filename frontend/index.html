<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener — Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f3;
      --surface:   #ffffff;
      --border:    #e2e0d8;
      --text:      #1a1a18;
      --muted:     #6b6b67;
      --accent:    #1D9E75;
      --accent-lt: #e1f5ee;
      --danger:    #e24b4a;
      --badge-bg:  #e1f5ee;
      --badge-txt: #0f6e56;
      --mono:      "JetBrains Mono", "Fira Mono", monospace;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    header span { font-size: 12px; color: var(--muted); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Shorten form ── */
    .shorten-row {
      display: flex;
      gap: 8px;
    }
    .shorten-row input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .shorten-row input:focus { border-color: var(--accent); }
    .shorten-row button {
      height: 40px;
      padding: 0 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .shorten-row button:hover { opacity: 0.88; }
    .shorten-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    #result-box {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: var(--accent-lt);
      border-radius: 8px;
      font-size: 13px;
      color: var(--badge-txt);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #result-box.hidden { display: none !important; }
    #short-url { font-family: var(--mono); font-weight: 600; }
    #copy-btn {
      background: none;
      border: 1px solid var(--badge-txt);
      color: var(--badge-txt);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    #copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    #error-box {
      display: none;
      margin-top: 10px;
      padding: 8px 14px;
      background: #fcebeb;
      border-radius: 8px;
      font-size: 13px;
      color: var(--danger);
    }
    #error-box.visible { display: block; }

    /* ── Metrics row ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }
    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .metric-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .metric-value { font-size: 26px; font-weight: 600; letter-spacing: -1px; }
    .metric-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Chart ── */
    .chart-wrap {
      position: relative;
      height: 200px;
    }

    /* ── Lookup bar ── */
    .lookup-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }
    .lookup-row input {
      flex: 1;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      font-family: var(--mono);
    }
    .lookup-row input:focus { border-color: var(--accent); }
    .lookup-row button {
      height: 36px;
      padding: 0 14px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      transition: background 0.15s;
    }
    .lookup-row button:hover { background: var(--bg); }

    /* ── URL table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
      padding: 0 0 8px;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 10px 0; vertical-align: middle; }
    .code-cell { font-family: var(--mono); font-weight: 600; color: var(--accent); }
    .url-cell { color: var(--muted); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      background: var(--badge-bg);
      color: var(--badge-txt);
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Loading / empty states ── */
    .state-msg {
      text-align: center;
      padding: 2rem;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      main { padding: 1rem; }
      .url-cell { max-width: 140px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🔗 URL Shortener</h1>
  <span id="api-status">Connecting...</span>
</header>

<main>

  <!-- Shorten form -->
  <div class="card">
    <div class="card-title">Shorten a URL</div>
    <div class="shorten-row">
      <input type="url" id="url-input" placeholder="https://your-long-url.com/path?query=value" />
      <button id="shorten-btn" onclick="shortenUrl()">Shorten</button>
    </div>
    <div id="result-box" class="hidden">
      <span>Short URL: <span id="short-url"></span></span>
      <button id="copy-btn" onclick="copyUrl()">Copy</button>
    </div>
    <div id="error-box"></div>
  </div>

  <!-- Metrics -->
  <div class="metrics" id="metrics-row">
    <div class="metric"><div class="metric-label">Clicks today</div><div class="metric-value" id="m-today">—</div><div class="metric-sub">Loading...</div></div>
    <div class="metric"><div class="metric-label">Active links</div><div class="metric-value" id="m-links">—</div><div class="metric-sub">Total shortened</div></div>
    <div class="metric"><div class="metric-label">Cache hit rate</div><div class="metric-value" id="m-cache">—</div><div class="metric-sub">Redis efficiency</div></div>
    <div class="metric"><div class="metric-label">Rate blocked</div><div class="metric-value" id="m-blocked">—</div><div class="metric-sub">Last 60 min</div></div>
  </div>

  <!-- Click chart -->
  <div class="card">
    <div class="card-title">
      Clicks — last 7 days
      <span style="float:right;">
        <input id="stat-code" type="text" placeholder="short code e.g. a1b2c3"
          style="font-family:monospace;font-size:12px;padding:2px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none;"
          onkeydown="if(event.key==='Enter') loadStats()" />
        <button onclick="loadStats()"
          style="font-size:12px;padding:2px 10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:none;color:var(--text);margin-left:4px;">
          Load
        </button>
      </span>
    </div>
    <div class="chart-wrap">
      <canvas id="click-chart"></canvas>
    </div>
  </div>

  <!-- Top URLs table -->
  <div class="card">
    <div class="card-title">All shortened URLs</div>
    <div id="urls-container"><div class="state-msg">Loading...</div></div>
  </div>

</main>

<script>
  const API = "";  // Same origin — FastAPI serves this HTML too.
                   // Change to "http://localhost:8000" if serving separately.

  // ── Shorten ──────────────────────────────────────────────────
  async function shortenUrl() {
    const input = document.getElementById("url-input");
    const btn = document.getElementById("shorten-btn");
    const resultBox = document.getElementById("result-box");
    const errorBox = document.getElementById("error-box");
    const url = input.value.trim();

    errorBox.classList.remove("visible");
    resultBox.classList.add("hidden");

    if (!url) return showError("Please enter a URL.");
    if (!url.startsWith("http")) return showError("URL must start with http:// or https://");

    btn.disabled = true;
    btn.textContent = "Shortening...";

    try {
      const res = await fetch(`${API}/shorten`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Server error");
      }
      const data = await res.json();
      document.getElementById("short-url").textContent = data.short_url;
      resultBox.classList.remove("hidden");
      input.value = "";
      loadAllUrls();  // refresh table
    } catch (e) {
      showError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "Shorten";
    }
  }

  function showError(msg) {
    const box = document.getElementById("error-box");
    box.textContent = msg;
    box.classList.add("visible");
  }

  function copyUrl() {
    const url = document.getElementById("short-url").textContent;
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById("copy-btn").textContent = "Copied!";
      setTimeout(() => { document.getElementById("copy-btn").textContent = "Copy"; }, 1500);
    });
  }

  // ── Metrics ──────────────────────────────────────────────────
  async function loadMetrics() {
    try {
      const res = await fetch(`${API}/metrics`);
      if (!res.ok) return;
      const d = await res.json();
      document.getElementById("m-today").textContent   = d.clicks_today ?? "—";
      document.getElementById("m-links").textContent   = d.total_links  ?? "—";
      document.getElementById("m-cache").textContent   = d.cache_hit_rate ? d.cache_hit_rate + "%" : "—";
      document.getElementById("m-blocked").textContent = d.rate_blocked  ?? "—";
      document.getElementById("api-status").textContent = "Connected ✓";
      document.getElementById("api-status").style.color = "#1D9E75";
    } catch {
      document.getElementById("api-status").textContent = "API offline";
      document.getElementById("api-status").style.color = "#e24b4a";
    }
  }

  // ── Chart ─────────────────────────────────────────────────────
  let chartInstance = null;

  function renderChart(labels, values) {
    const ctx = document.getElementById("click-chart").getContext("2d");
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: "#1D9E75",
          borderRadius: 5,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { size: 12 } } },
          y: { beginAtZero: true, ticks: { font: { size: 12 }, precision: 0 } }
        }
      }
    });
  }

  async function loadStats() {
    const code = document.getElementById("stat-code").value.trim();
    if (!code) return;
    try {
      const res = await fetch(`${API}/stats/${code}`);
      if (!res.ok) return alert("Code not found.");
      const data = await res.json();  // [{date, count}, ...]
      renderChart(data.map(r => r.date), data.map(r => r.count));
    } catch (e) {
      alert("Could not load stats: " + e.message);
    }
  }

  // Load placeholder chart on startup (last 7 days, zero data)
  function initChart() {
    const labels = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      labels.push(d.toLocaleDateString("en-US", { weekday: "short" }));
    }
    renderChart(labels, new Array(7).fill(0));
  }

  // ── URL table ─────────────────────────────────────────────────
  async function loadAllUrls() {
    const container = document.getElementById("urls-container");
    try {
      const res = await fetch(`${API}/urls`);
      if (!res.ok) throw new Error("Failed to fetch");
      const urls = await res.json();  // [{short_code, original_url, click_count, created_at}]

      if (!urls.length) {
        container.innerHTML = `<div class="state-msg">No URLs yet — shorten one above!</div>`;
        return;
      }

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Short code</th>
              <th>Original URL</th>
              <th>Created</th>
              <th style="text-align:right">Clicks</th>
            </tr>
          </thead>
          <tbody>
            ${urls.map(u => `
              <tr>
                <td class="code-cell">
                  <a href="${API}/${u.short_code}" target="_blank"
                     style="color:inherit;text-decoration:none;">${u.short_code}</a>
                </td>
                <td class="url-cell" title="${u.original_url}">${u.original_url}</td>
                <td style="color:var(--muted)">${new Date(u.created_at).toLocaleDateString()}</td>
                <td style="text-align:right"><span class="badge">${u.click_count ?? 0}</span></td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    } catch {
      container.innerHTML = `<div class="state-msg">Could not load URLs — is the API running?</div>`;
    }
  }

  // ── Boot ──────────────────────────────────────────────────────
  initChart();
  loadMetrics();
  loadAllUrls();
  setInterval(loadMetrics, 30000);  // refresh metrics every 30s
</script>
</body>
</html>
