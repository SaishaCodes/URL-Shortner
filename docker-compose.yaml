version: "3.9"
services:
  api:
    build: .
    ports: ["8000:8000"]
    depends_on: [redis, db]
    environment:
      DATABASE_URL: postgresql://user:pass@db/urldb
      REDIS_URL: redis://redis:6379

  redis:
    image: redis:7-alpine

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: urldb